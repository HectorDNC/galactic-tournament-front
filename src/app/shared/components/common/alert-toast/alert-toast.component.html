<div class="fixed bottom-5 right-5 z-[100000] flex flex-col gap-3 w-80 max-w-[90vw]">
  <ng-container *ngFor="let alert of alerts; trackBy: trackById">
    <div
      class="toast-enter rounded-xl border p-4 shadow-lg"
      [ngClass]="getContainerClass(alert.type)"
    >
      <div class="flex items-start gap-3">
        <div
          class="-mt-0.5 shrink-0"
          [ngClass]="getIconClass(alert.type)"
          [innerHTML]="getIcon(alert.type)"
        ></div>

        <div class="flex-1 min-w-0">
          <h4 class="mb-0.5 text-sm font-semibold text-gray-800 dark:text-white/90">
            {{ alert.title }}
          </h4>
          <p class="text-sm text-gray-500 dark:text-gray-400 break-words">
            {{ alert.message }}
          </p>
        </div>

        <button
          type="button"
          class="shrink-0 ml-1 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors"
          (click)="dismiss(alert.id)"
          aria-label="Cerrar"
        >
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>
  </ng-container>
</div>
