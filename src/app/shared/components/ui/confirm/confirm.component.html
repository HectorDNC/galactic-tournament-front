<app-modal [isOpen]="isOpen" (close)="onCancel()" className="max-w-md mx-4">
  <div class="px-6 py-6 sm:px-8 sm:py-8">
    <div class="mb-3">
      <h4 class="text-lg font-semibold text-gray-800 dark:text-white/90">{{ title }}</h4>
    </div>
    <div class="text-sm text-gray-600 dark:text-gray-400 mb-6">{{ message }}</div>

    <div class="flex justify-end gap-3">
      <button
        type="button"
        (click)="onCancel()"
        class="rounded-lg border border-gray-300 bg-white px-4 py-2.5 text-sm font-medium text-gray-700 transition hover:bg-gray-50 dark:border-gray-700 dark:bg-gray-800 dark:text-gray-400 dark:hover:bg-white/[0.03]"
      >
        {{ cancelText }}
      </button>
      <button
        type="button"
        (click)="onConfirm()"
        class="inline-flex items-center gap-2 rounded-lg bg-brand-500 px-4 py-2.5 text-sm font-medium text-white transition hover:bg-brand-600"
      >
        {{ confirmText }}
      </button>
    </div>
  </div>
</app-modal>
